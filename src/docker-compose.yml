services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: ce_rabbit
    env_file: [../.env]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - rabbit_data:/var/lib/rabbitmq

  db:
    image: postgres:16
    container_name: ce_db
    env_file: [../.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    container_name: ce_server
    build:
      context: ..
      dockerfile: src/Dockerfile.server
    depends_on:
      db: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    env_file: [../.env]
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    restart: unless-stopped

  discord_bot:
    container_name: ce_bot
    build:
      context: ..
      dockerfile: src/Dockerfile.bot
    depends_on:
      db: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      server: { condition: service_started }
    env_file: [../.env]
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
    restart: unless-stopped

volumes:
  postgres_data:
  rabbit_data:
